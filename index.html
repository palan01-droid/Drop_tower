<!DOCTYPE html>
<html>
<head>
<title>Drop Tower Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    padding: 30px;
    color: #111;
  }
  h2 { margin-bottom: 4px; }
  p.sub { color: #888; font-size: 13px; margin-bottom: 30px; }
  .readings { display: flex; gap: 20px; margin-bottom: 30px; }
  .box {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 16px 24px;
    min-width: 140px;
  }
  .box .name { font-size: 13px; color: #888; margin-bottom: 6px; }
  .box .num  { font-size: 36px; font-weight: bold; }
  #chart-container {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
  }
  #status { font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<h2>Drop Tower — FSR Readings</h2>
<p class="sub">FSR 402 sensors · Skin / Skull / Brain layers · ESP32</p>

<div class="readings">
  <div class="box">
    <div class="name">Skin (FSR 1)</div>
    <div class="num" id="v1" style="color:#2196F3">—</div>
  </div>
  <div class="box">
    <div class="name">Skull (FSR 2)</div>
    <div class="num" id="v2" style="color:#4CAF50">—</div>
  </div>
  <div class="box">
    <div class="name">Brain (FSR 3)</div>
    <div class="num" id="v3" style="color:#f44336">—</div>
  </div>
</div>

<div id="chart-container">
  <canvas id="chart" height="80"></canvas>
</div>

<div id="status">Connecting...</div>

<script>
  const labels = [], d1 = [], d2 = [], d3 = [];

  const chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Skin",  data: d1, borderColor: "#2196F3", borderWidth: 2, pointRadius: 0, tension: 0.2 },
        { label: "Skull", data: d2, borderColor: "#4CAF50", borderWidth: 2, pointRadius: 0, tension: 0.2 },
        { label: "Brain", data: d3, borderColor: "#f44336", borderWidth: 2, pointRadius: 0, tension: 0.2 },
      ]
    },
    options: {
      animation: false,
      scales: {
        x: { display: false },
        y: { min: 0, max: 4095 }
      }
    }
  });

  let t = 0;
  const socket = io();

  socket.on("connect",    () => document.getElementById("status").textContent = "Connected");
  socket.on("disconnect", () => document.getElementById("status").textContent = "Disconnected");

  socket.on("reading", (d) => {
    document.getElementById("v1").textContent = d.skin;
    document.getElementById("v2").textContent = d.skull;
    document.getElementById("v3").textContent = d.brain;
    document.getElementById("status").textContent = "Live";

    labels.push(t++);
    d1.push(d.skin); d2.push(d.skull); d3.push(d.brain);

    if (labels.length > 100) {
      labels.shift(); d1.shift(); d2.shift(); d3.shift();
    }

    chart.update();
  });
</script>

</body>
</html>
